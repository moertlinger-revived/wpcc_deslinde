<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Admin - PadelSafe PRO</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f0f4f8; margin: 0; padding: 20px; }
        .dashboard { max-width: 1100px; margin: 0 auto; background: white; padding: 2rem; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        h1 { color: #1a1a1a; border-bottom: 2px solid #f0f4f8; padding-bottom: 15px; margin-bottom: 20px; }
        .search-box { margin-bottom: 20px; }
        input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 1rem; box-sizing: border-box; }
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; background: #f8fafc; padding: 12px; border-bottom: 2px solid #edf2f7; }
        td { padding: 12px; border-bottom: 1px solid #edf2f7; }
        .btn { border: none; padding: 8px 12px; border-radius: 6px; cursor: pointer; font-weight: 600; margin-right: 5px; }
        .btn-pdf { background: #27ae60; color: white; }
        .btn-view { background: #edf2f7; color: #4a5568; }
        .modal { display: none; position: fixed; z-index: 100; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); }
        .modal-content { background: white; margin: 10% auto; padding: 20px; width: 90%; max-width: 500px; border-radius: 12px; position: relative; text-align: center; }
        .firma-preview { border: 1px solid #eee; width: 100%; margin-top: 15px; }
    </style>
</head>
<body>

<div class="dashboard">
    <h1>PadelSafe Admin</h1>
    <div class="search-box">
        <input type="text" id="searchInput" placeholder="Buscar por DNI o Nombre...">
    </div>
    <table>
        <thead>
            <tr>
                <th>Fecha</th>
                <th>Jugador</th>
                <th>DNI</th>
                <th>Acciones</th>
            </tr>
        </thead>
        <tbody id="resultsTable">
            <tr><td colspan="4" style="text-align:center;">Cargando datos...</td></tr>
        </tbody>
    </table>
</div>

<div id="firmaModal" class="modal">
    <div class="modal-content">
        <span style="position:absolute;right:20px;cursor:pointer;font-size:24px;" onclick="document.getElementById('firmaModal').style.display='none'">&times;</span>
        <h3>Firma Digital</h3>
        <img id="imgFirma" class="firma-preview" src="">
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.15.0/firebase-app.js";
    import { getFirestore, collection, query, orderBy, onSnapshot } from "https://www.gstatic.com/firebasejs/9.15.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCvB-licXMCGf0aotJOJis-UDETCWi0kTU",
        authDomain: "padel-safe-pro.firebaseapp.com",
        projectId: "padel-safe-pro",
        storageBucket: "padel-safe-pro.firebasestorage.app",
        messagingSenderId: "824419244376",
        appId: "1:824419244376:web:6b36a78150e62ef1622d2d"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    let todosLosDeslindes = [];

    // Obtener datos
    const q = query(collection(db, "deslindes"), orderBy("fecha", "desc"));
    onSnapshot(q, (snapshot) => {
        todosLosDeslindes = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
        renderTable(todosLosDeslindes);
    }, (error) => {
        console.error("Error al obtener datos: ", error);
        document.getElementById('resultsTable').innerHTML = `<tr><td colspan="4" style="color:red;">Error: Revisa las Reglas de Firebase.</td></tr>`;
    });

    function renderTable(data) {
        const tableBody = document.getElementById('resultsTable');
        if (data.length === 0) {
            tableBody.innerHTML = '<tr><td colspan="4" style="text-align:center;">No hay registros encontrados.</td></tr>';
            return;
        }
        
        tableBody.innerHTML = '';
        data.forEach(item => {
            const row = document.createElement('tr');
            row.innerHTML = `
                <td>${item.fecha ? item.fecha.split(',')[0] : 'S/F'}</td>
                <td><strong>${item.nombre}</strong></td>
                <td>${item.dni}</td>
                <td>
                    <button class="btn btn-view" id="v-${item.id}">Ver</button>
                    <button class="btn btn-pdf" id="p-${item.id}">PDF</button>
                </td>
            `;
            tableBody.appendChild(row);

            // Asignar eventos a los botones de forma segura
            document.getElementById(`v-${item.id}`).onclick = () => {
                document.getElementById('imgFirma').src = item.firma_img;
                document.getElementById('firmaModal').style.display = 'block';
            };

            document.getElementById(`p-${item.id}`).onclick = () => {
                generarPDFAdmin(item.nombre, item.dni, item.fecha, item.firma_img);
            };
        });
    }

    // Buscador
    document.getElementById('searchInput').oninput = (e) => {
        const term = e.target.value.toLowerCase();
        const filtrados = todosLosDeslindes.filter(d => 
            d.nombre.toLowerCase().includes(term) || d.dni.includes(term)
        );
        renderTable(filtrados);
    };

    async function generarPDFAdmin(nombre, dni, fecha, firmaImg) {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        doc.rect(10, 10, 190, 277);
        doc.setFontSize(20);
        doc.text("DESLINDE DE RESPONSABILIDAD", 105, 30, { align: "center" });
        doc.setFontSize(12);
        doc.text(`Nombre: ${nombre}`, 20, 60);
        doc.text(`DNI: ${dni}`, 20, 70);
        doc.text(`Fecha: ${fecha}`, 20, 80);
        doc.addImage(firmaImg, 'PNG', 20, 100, 60, 25);
        
        const pdfBlob = doc.output('blob');
        const file = new File([pdfBlob], `Deslinde_${dni}.pdf`, { type: 'application/pdf' });
        if (navigator.canShare && navigator.canShare({ files: [file] })) {
            await navigator.share({ files: [file], title: 'PDF Deslinde' });
        } else {
            doc.save(`Deslinde_${dni}.pdf`);
        }
    }
</script>

</body>
</html>
