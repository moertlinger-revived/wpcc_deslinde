<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Admin - PadelSafe</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f0f4f8; margin: 0; padding: 20px; }
        .dashboard { max-width: 1000px; margin: 0 auto; background: white; padding: 2rem; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        h1 { color: #1a1a1a; display: flex; justify-content: space-between; align-items: center; }
        .search-box { margin-bottom: 2rem; display: flex; gap: 10px; }
        input { flex: 1; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 1rem; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { text-align: left; background: #f8fafc; padding: 12px; border-bottom: 2px solid #edf2f7; color: #4a5568; }
        td { padding: 12px; border-bottom: 1px solid #edf2f7; color: #2d3748; }
        .btn-view { background: #3182ce; color: white; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; }
        .badge { background: #c6f6d5; color: #22543d; padding: 4px 8px; border-radius: 4px; font-size: 0.8rem; font-weight: bold; }
        
        /* Modal para ver la firma */
        .modal { display: none; position: fixed; z-index: 100; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); }
        .modal-content { background: white; margin: 10% auto; padding: 20px; width: 90%; max-width: 500px; border-radius: 12px; text-align: center; }
        .firma-preview { border: 1px solid #eee; width: 100%; margin-top: 10px; }
        .close-modal { float: right; cursor: pointer; font-size: 1.5rem; }
    </style>
</head>
<body>

<div class="dashboard">
    <h1>
        Admin PadelSafe 
        <span style="font-size: 0.9rem; font-weight: normal; color: #666;">Control de Deslindes</span>
    </h1>

    <div class="search-box">
        <input type="text" id="searchInput" placeholder="Buscar por DNI o Nombre...">
    </div>

    <table>
        <thead>
            <tr>
                <th>Fecha</th>
                <th>Jugador</th>
                <th>DNI</th>
                <th>Estado</th>
                <th>Acción</th>
            </tr>
        </thead>
        <tbody id="resultsTable">
            </tbody>
    </table>
</div>

<div id="firmaModal" class="modal">
    <div class="modal-content">
        <span class="close-modal" id="closeModal">&times;</span>
        <h3>Firma del Jugador</h3>
        <p id="modalInfo"></p>
        <img id="imgFirma" class="firma-preview" src="" alt="Firma">
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.15.0/firebase-app.js";
    import { getFirestore, collection, query, orderBy, onSnapshot } from "https://www.gstatic.com/firebasejs/9.15.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCvB-licXMCGf0aotJOJis-UDETCWi0kTU",
        authDomain: "padel-safe-pro.firebaseapp.com",
        projectId: "padel-safe-pro",
        storageBucket: "padel-safe-pro.firebasestorage.app",
        messagingSenderId: "824419244376",
        appId: "1:824419244376:web:6b36a78150e62ef1622d2d"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    let todosLosDeslindes = [];

    // 1. ESCUCHAR CAMBIOS EN TIEMPO REAL
    const q = query(collection(db, "deslindes"), orderBy("fecha", "desc"));
    
    onSnapshot(q, (snapshot) => {
        todosLosDeslindes = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
        renderTable(todosLosDeslindes);
    });

    function renderTable(data) {
        const tableBody = document.getElementById('resultsTable');
        tableBody.innerHTML = '';

        data.forEach(item => {
            const row = `
                <tr>
                    <td>${item.fecha.split(',')[0]}</td>
                    <td><strong>${item.nombre}</strong></td>
                    <td>${item.dni}</td>
                    <td><span class="badge">FIRMADO</span></td>
                    <td><button class="btn-view" onclick="verFirma('${item.firma_img}', '${item.nombre}')">Ver Firma</button></td>
                </tr>
            `;
            tableBody.innerHTML += row;
        });
    }

    // 2. BUSCADOR EN VIVO
    document.getElementById('searchInput').addEventListener('input', (e) => {
        const term = e.target.value.toLowerCase();
        const filtrados = todosLosDeslindes.filter(d => 
            d.nombre.toLowerCase().includes(term) || d.dni.includes(term)
        );
        renderTable(filtrados);
    });

    // 3. LOGICA DEL MODAL (Global para que el botón funcione)
    window.verFirma = (imgData, nombre) => {
        document.getElementById('imgFirma').src = imgData;
        document.getElementById('modalInfo').innerText = "Jugador: " + nombre;
        document.getElementById('firmaModal').style.display = "block";
    };

    document.getElementById('closeModal').onclick = () => {
        document.getElementById('firmaModal').style.display = "none";
    };
</script>

</body>
</html>
