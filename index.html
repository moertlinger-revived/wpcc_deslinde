<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PadelSafe - Registro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/signature_pad@4.0.0/dist/signature_pad.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f4f7f6; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .container { background: white; padding: 2rem; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); width: 100%; max-width: 450px; margin: 10px; }
        h2 { color: #1a1a1a; text-align: center; margin-bottom: 20px; }
        .form-group { margin-bottom: 1.2rem; }
        label { display: block; margin-bottom: 0.5rem; font-weight: 600; }
        input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 1rem; }
        .legal-box { height: 100px; overflow-y: auto; border: 1px solid #eee; padding: 10px; background: #fafafa; border-radius: 8px; margin-bottom: 1rem; font-size: 0.8rem; color: #666; }
        .signature-container { border: 2px dashed #ccc; border-radius: 8px; background: #fff; margin-bottom: 5px; }
        canvas { width: 100%; height: 180px; touch-action: none; }
        .btn-submit { width: 100%; padding: 15px; background: #27ae60; color: white; border: none; border-radius: 8px; font-size: 1rem; font-weight: 700; cursor: pointer; margin-top: 10px; }
        .btn-submit:disabled { background: #95a5a6; }
        .btn-clear { background: none; border: none; color: #e74c3c; font-size: 0.8rem; text-decoration: underline; cursor: pointer; float: right; }
    </style>
</head>
<body>

<div class="container">
    <h2>📝 Deslinde PadelSafe</h2>
    <div class="form-group">
        <label>Nombre Completo</label>
        <input type="text" id="nombre" placeholder="Ej: Juan Pérez">
    </div>
    <div class="form-group">
        <label>DNI / Pasaporte</label>
        <input type="text" id="dni" placeholder="Ingrese su documento">
    </div>
    <div class="legal-box">
        Declaro estar en perfectas condiciones de salud para jugar al pádel y libero al club de toda responsabilidad por lesiones o accidentes.
    </div>
    <label>Firme aquí</label>
    <div class="signature-container">
        <canvas id="signature-pad"></canvas>
    </div>
    <button class="btn-clear" id="clear-button">Borrar Firma</button>
    <button class="btn-submit" id="submit-button">CONFIRMAR Y FIRMAR</button>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.15.0/firebase-app.js";
    import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/9.15.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCvB-licXMCGf0aotJOJis-UDETCWi0kTU",
        authDomain: "padel-safe-pro.firebaseapp.com",
        projectId: "padel-safe-pro",
        storageBucket: "padel-safe-pro.firebasestorage.app",
        messagingSenderId: "824419244376",
        appId: "1:824419244376:web:6b36a78150e62ef1622d2d"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const canvas = document.getElementById("signature-pad");
    const signaturePad = new SignaturePad(canvas);

    function resizeCanvas() {
        const ratio = Math.max(window.devicePixelRatio || 1, 1);
        canvas.width = canvas.offsetWidth * ratio;
        canvas.height = canvas.offsetHeight * ratio;
        canvas.getContext("2d").scale(ratio, ratio);
        signaturePad.clear();
    }
    window.onresize = resizeCanvas;
    resizeCanvas();

    document.getElementById('clear-button').onclick = () => signaturePad.clear();

    document.getElementById('submit-button').onclick = async () => {
        const { jsPDF } = window.jspdf;
        const nombre = document.getElementById('nombre').value;
        const dni = document.getElementById('dni').value;

        if (!nombre || !dni || signaturePad.isEmpty()) {
            alert("⚠️ Por favor completa todos los datos.");
            return;
        }

        const btn = document.getElementById('submit-button');
        btn.disabled = true;
        btn.innerText = "GUARDANDO...";

        const firmaImg = signaturePad.toDataURL();
        const fecha = new Date().toLocaleString('es-AR');

        try {
            // 1. GUARDAR EN FIREBASE
            await addDoc(collection(db, "deslindes"), {
                nombre, dni, fecha, firma_img: firmaImg, firmado: true
            });

            // 2. GENERAR PDF
            const doc = new jsPDF();
            doc.text("DESLINDE DE RESPONSABILIDAD", 105, 20, { align: "center" });
            doc.text(`Jugador: ${nombre}`, 20, 40);
            doc.text(`DNI: ${dni}`, 20, 50);
            doc.text(`Fecha: ${fecha}`, 20, 60);
            doc.addImage(firmaImg, 'PNG', 20, 70, 60, 25);

            // 3. INTENTAR COMPARTIR O DESCARGAR
            try {
                const pdfBlob = doc.output('blob');
                const file = new File([pdfBlob], `Deslinde_${dni}.pdf`, { type: 'application/pdf' });
                
                if (navigator.share && navigator.canShare({ files: [file] })) {
                    await navigator.share({ files: [file], title: 'Tu Deslinde' });
                } else {
                    doc.save(`Deslinde_${dni}.pdf`);
                }
            } catch (sErr) {
                doc.save(`Deslinde_${dni}.pdf`);
            }

            alert("✅ ¡Registro Exitoso!");
            location.reload();

        } catch (e) {
            console.error(e);
            alert("Error al conectar con la base de datos.");
            btn.disabled = false;
            btn.innerText = "CONFIRMAR Y FIRMAR";
        }
    };
</script>
</body>
</html>
